{% assign flow = site.data.landing.adoption_steps %}
<section id="adoption" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ flow.section_label }}</p>
      <h2>{{ flow.title }}</h2>
      <p>{{ flow.description }}</p>
    </div>
    <div class="steps-grid">
      {% for step in flow.steps %}
        <article class="step-card">
          <p class="step-card__number">{{ step.number }}</p>
          <h3>{{ step.title }}</h3>
          <p>{{ step.text }}</p>
          <p class="step-card__meta">{{ step.meta }}</p>
          <a class="text-link" href="{{ step.link_url }}">{{ step.link_label }}</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
