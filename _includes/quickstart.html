{% assign flow = site.data.landing.adoption_steps %}
<section id="adoption" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ flow.section_label }}</p>
      <h2>{{ flow.title }}</h2>
      <p>{{ flow.description }}</p>
    </div>
    <div class="steps-band">
      {% for step in flow.steps %}
        <div class="step-row">
          <div class="step-row__head">
            <span class="step-row__num">{{ step.number }}</span>
            <h3>{{ step.title }}</h3>
          </div>
          <p class="step-row__text">{{ step.text }}</p>
          <p class="step-row__meta">{{ step.meta }}</p>
          <a class="text-link" href="{{ step.link_url }}">{{ step.link_label }}</a>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
