{% assign hero = site.data.landing.hero %}
<section id="top" class="section section--hero">
  <div class="container">
    <p class="eyebrow">{{ hero.eyebrow }}</p>
    <h1 class="hero__title">{{ hero.title }}</h1>
    <p class="hero__lead">{{ hero.description }}</p>
    <div class="hero__actions">
      <a class="button button--primary" href="{{ hero.primary_cta.url }}">{{ hero.primary_cta.label }}</a>
      <a class="button button--ghost" href="{{ hero.secondary_cta.url }}">{{ hero.secondary_cta.label }}</a>
    </div>
  </div>
</section>
