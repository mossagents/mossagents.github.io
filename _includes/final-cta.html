{% assign cta = site.data.landing.final_cta %}
<section class="section section--final">
  <div class="container">
    <div class="final-cta">
      <div class="final-cta__copy">
        <p class="eyebrow">{{ cta.eyebrow }}</p>
        <h2>{{ cta.title }}</h2>
        <p>{{ cta.text }}</p>
      </div>
      <div class="final-cta__actions">
        <a class="button button--primary" href="{{ cta.primary_url }}">{{ cta.primary_label }}</a>
        <a class="button button--ghost" href="{{ cta.secondary_url }}">{{ cta.secondary_label }}</a>
      </div>
    </div>
  </div>
</section>
