{% assign surfaces = site.data.landing.product_surfaces %}
<section id="surfaces" class="section section--soft">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ surfaces.section_label }}</p>
      <h2>{{ surfaces.title }}</h2>
      <p>{{ surfaces.description }}</p>
    </div>
    <div class="surface-catalog">
      {% for item in surfaces.items %}
        <article class="surface-card">
          <span class="tag">{{ item.type }}</span>
          <div class="surface-card__body">
            <h3>{{ item.name }}</h3>
            <p>{{ item.text }}</p>
          </div>
          <a class="text-link" href="{{ item.href }}">{{ item.link_label }}</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
