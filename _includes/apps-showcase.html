{% assign surfaces = site.data.landing.product_surfaces %}
<section id="surfaces" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ surfaces.section_label }}</p>
      <h2>{{ surfaces.title }}</h2>
      <p>{{ surfaces.description }}</p>
    </div>
    <div class="surface-index">
      {% for item in surfaces.items %}
        <div class="surface-row">
          <span class="surface-row__type">{{ item.type }}</span>
          <h3 class="surface-row__name">{{ item.name }}</h3>
          <p class="surface-row__text">{{ item.text }}</p>
          <a class="text-link" href="{{ item.href }}">{{ item.link_label }}</a>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
