{% assign apps = site.data.landing.apps %}
<section id="apps" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ apps.section_label }}</p>
      <h2>{{ apps.title }}</h2>
      <p>{{ apps.description }}</p>
    </div>
    <div class="catalog-grid">
      {% for item in apps.items %}
        <article class="catalog-item">
          <span class="tag">{{ item.type }}</span>
          <div class="catalog-item__body">
            <h3>{{ item.name }}</h3>
            <p>{{ item.text }}</p>
          </div>
          <a class="text-link" href="{{ item.href }}">Open {{ item.name }}</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
