{% assign section = site.data.landing.surfaces %}
<section id="surfaces" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ section.section_label }}</p>
      <h2>{{ section.title }}</h2>
      <p>{{ section.description }}</p>
    </div>
    <div class="surface-grid">
      {% for item in section.items %}
        <article class="surface-item">
          <p class="surface-item__index">{{ forloop.index | prepend: '0' | slice: -2, 2 }}</p>
          <h3>{{ item.title }}</h3>
          <p>{{ item.text }}</p>
          <a class="text-link" href="{{ item.href }}">{{ item.cta }}</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
