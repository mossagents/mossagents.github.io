hero:
  eyebrow: Open-source runtime for agent systems in Go
  title: Build agent products on a runtime that stays composable.
  description: Moss gives engineering teams a reusable kernel, runtime assembly, and ready-to-run app surfaces for coding, research, and workflow products in Go.
  primary_cta:
    label: View on GitHub
    url: https://github.com/mossagents/moss
  secondary_cta:
    label: Read the English README
    url: https://github.com/mossagents/moss/blob/main/README.md
  caption: Library-first runtime, appkit assembly, product presets, and app surfaces all live in one repository, but they stay understandable as separate layers.
  summary:
    eyebrow: Runtime summary
    title: Built from runtime layers that stay explicit.
    text: Start with a minimal kernel, load capabilities through appkit/runtime, then move into presets and product surfaces only when the workflow demands it.
    points:
      - title: Reusable kernel
        text: Sessions, tools, middleware, observation, and execution foundations stay in one small core.
      - title: Capability loading
        text: Builtin tools, MCP, skills, subagents, memory, and context are assembled above the kernel.
      - title: Product path
        text: appkit and presets open into core apps and runnable examples instead of hiding the runtime behind one opaque shell.
    snippet_label: Run the primary surface
    snippet_language: shell
    snippet: |
      go run ./apps/mosscode --provider openai --model gpt-4o

technical_pillars:
  section_label: Technical pillars
  title: Runtime boundaries first. Product surfaces second.
  description: Moss is structured so teams can evaluate and extend each layer without inheriting one monolithic agent stack.
  items:
    - title: Composable runtime foundation
      text: The kernel keeps core runtime primitives small, reusable, and easier to reason about.
    - title: Extensible capability loading
      text: appkit/runtime wires builtin tools, MCP, prompt skills, delegated agents, memory, and context into one assembly path.
    - title: Trust-aware execution
      text: Profiles, trust, approval, workspace rules, and execution posture stay visible instead of being buried in product glue.
    - title: Stateful workflows
      text: Session, checkpoint, task, memory, and planning paths support longer-lived agent behavior beyond one-shot prompts.
    - title: App surfaces and examples
      text: apps and examples prove the runtime in real coding, research, writing, and orchestration workflows.
    - title: Runtime before product lock-in
      text: Teams can start from shipped surfaces, then move inward to appkit or presets as they need deeper control.

adoption_steps:
  section_label: Adoption flow
  title: Start with a surface, then open the runtime.
  description: Moss is designed so evaluation can begin from something runnable and become more composable as your team goes deeper.
  steps:
    - number: "01"
      title: Run a real surface
      text: Start with mosscode to see the most complete interactive product surface in the repository.
      meta: apps/mosscode
      link_label: Open mosscode
      link_url: https://github.com/mossagents/moss/tree/main/apps/mosscode
    - number: "02"
      title: Build with appkit
      text: Move to BuildKernel or BuildKernelWithExtensions when you want the runtime without inheriting the whole product shell.
      meta: appkit and appkit/runtime
      link_label: Read the README
      link_url: https://github.com/mossagents/moss/blob/main/README.md
    - number: "03"
      title: Extend into product paths
      text: Use presets/deepagent and the reference examples when you need coding, research, writer, or orchestration patterns.
      meta: presets/deepagent and examples/*
      link_label: Browse examples
      link_url: https://github.com/mossagents/moss/tree/main/examples

runtime_architecture:
  section_label: Runtime architecture
  title: A small kernel beneath a broader runtime system.
  description: Moss keeps stable runtime primitives in kernel, moves default capability loading into appkit/runtime, and leaves product assembly to appkit, presets, apps, and examples.
  summary: The repository is easiest to understand as layered runtime assembly. Kernel remains minimal, runtime adds default capability loading, appkit and presets shape product paths, and apps/examples prove how those layers are used.
  layers:
    - label: Core runtime
      detail: kernel
      text: Sessions, tool lifecycle, middleware, models, observation, checkpoints, and execution primitives.
    - label: Runtime assembly
      detail: appkit/runtime
      text: Default loading for builtin tools, MCP servers, prompt skills, subagents, context, memory, and scheduling.
    - label: Builder APIs
      detail: appkit
      text: BuildKernel and BuildKernelWithExtensions turn flags and options into a usable runtime assembly.
    - label: Product preset
      detail: presets/deepagent
      text: Product-grade composition for coding, research, writer, and deeper workflow products.
    - label: Apps and examples
      detail: apps/* and examples/*
      text: Core apps and reference implementations show what the runtime looks like in working product surfaces.

product_surfaces:
  section_label: Product surfaces
  title: Evaluate the shipped surfaces and runnable patterns.
  description: Moss is not only a runtime API. The repository also exposes app surfaces and examples that show how the runtime is assembled in practice.
  items:
    - name: mosscode
      type: Core app
      text: The most complete coding-oriented product surface in the repository and the packaged moss CLI target.
      href: https://github.com/mossagents/moss/tree/main/apps/mosscode
      link_label: Explore mosscode
    - name: mosswork
      type: Core app
      text: Desktop collaboration surface built on the same runtime foundation and product assembly model.
      href: https://github.com/mossagents/moss/tree/main/apps/mosswork
      link_label: Explore mosswork
    - name: mossresearch
      type: Example
      text: Research-oriented orchestration path that demonstrates evidence gathering and deeper delegated workflows.
      href: https://github.com/mossagents/moss/tree/main/examples/mossresearch
      link_label: Open mossresearch
    - name: mosswriter
      type: Example
      text: Writer-style product path that shows how workflow structure can be built above the same runtime layers.
      href: https://github.com/mossagents/moss/tree/main/examples/mosswriter
      link_label: Open mosswriter

