faq:
  section_label: FAQ
  title: Questions engineers ask before they commit.
  description: The homepage should answer the framing questions quickly so readers know how to evaluate Moss.
  items:
    - question: What is Moss today?
      answer: Moss is a library-first agent runtime for Go with a reusable kernel, a configurable runtime assembly layer, core app surfaces under apps, and runnable examples under examples.
    - question: Who is Moss for?
      answer: Moss is aimed at engineering teams that want clearer runtime boundaries, extensibility, and a path from reusable runtime code into real agent products.
    - question: How does the runtime relate to apps and examples?
      answer: The runtime layers sit underneath the app surfaces. apps and examples are concrete entry points that prove how kernel, appkit, runtime loading, and presets show up in working products.

